  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9b51c025-2129-4734-84e6-8d9a9d9e4d31\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\n  html,body{margin:0;padding:0;}\n  button{font-family:inherit;cursor:pointer;border:none;background:none;}\n  input{font-family:inherit;}\n  ::placeholder{color:#C3B5A2;}\n  @keyframes jp-toast{0%{transform:translate(-50%,24px);opacity:0;}12%{transform:translate(-50%,0);opacity:1;}88%{transform:translate(-50%,0);opacity:1;}100%{transform:translate(-50%,-8px);opacity:0;}}\n  @keyframes jp-pop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}\n  @keyframes jp-shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}\n  @keyframes jp-fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}\n  @keyframes jp-ring{from{stroke-dashoffset:var(--from);}to{stroke-dashoffset:var(--to);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--cream:#FCF7EC; --ink:#241B12; --ink2:#9A8975; --brand:#FFC81F; --brandD:#F0A91A; --pale:#FFF3C9; --pale2:#FFFBEC; --leaf:#5E9C53; --leafBg:#E9F2E0; --line:#EEE3CF; --card:#FFFFFF; font-family:Pretendard,sans-serif; color:var(--ink); min-height:100vh; background:radial-gradient(120% 80% at 50% -10%, #FFF7DC 0%, #FCF7EC 46%, #F6EFE0 100%); padding:0 0 80px;\">\n\n  <!-- ========== DEMO SWITCHER ========== -->\n  <div style=\"position:sticky; top:0; z-index:50; display:flex; justify-content:center; padding:14px 16px; background:linear-gradient(#FCF7EC 70%, rgba(252,247,236,0)); \">\n    <div style=\"display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:6px; box-shadow:0 8px 24px -14px rgba(80,55,20,.4);\">\n      <span style=\"font-size:11px; font-weight:800; letter-spacing:.12em; color:var(--ink2); padding:0 8px 0 12px;\">DEMO<\u002Fspan>\n      <div style=\"display:flex; background:#F5EEDF; border-radius:999px; padding:3px;\">\n        <button onclick=\"{{ pickCustomer }}\" style=\"{{ custBtnStyle }}\">📱 손님<\u002Fbutton>\n        <button onclick=\"{{ pickOwner }}\" style=\"{{ ownerBtnStyle }}\">🧑‍🍳 사장님<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showVariant }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; align-items:center; gap:6px; border-left:1px solid var(--line); padding-left:10px;\">\n          <span style=\"font-size:11px; font-weight:700; color:var(--ink2);\">시안<\u002Fspan>\n          <div style=\"display:flex; background:#F5EEDF; border-radius:999px; padding:3px;\">\n            <button onclick=\"{{ pickVarA }}\" style=\"{{ varABtnStyle }}\">A<\u002Fbutton>\n            <button onclick=\"{{ pickVarB }}\" style=\"{{ varBBtnStyle }}\">B<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================================================ -->\n  <!-- ================= CUSTOMER : MOBILE FRAME ================== -->\n  <!-- ============================================================ -->\n  <sc-if value=\"{{ modeCustomer }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:flex; justify-content:center; padding:6px 16px;\">\n    <div style=\"width:min(100%,430px); background:var(--cream); border-radius:30px; border:1px solid var(--line); box-shadow:0 30px 70px -30px rgba(70,45,12,.45); overflow:hidden; min-height:740px; position:relative;\">\n\n      <!-- CUSTOMER LANDING -->\n      <sc-if value=\"{{ cLanding }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:jp-fade .4s ease; padding:30px 24px 36px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; padding:18px 0 26px;\">\n          <div style=\"width:78px; height:78px; border-radius:24px; background:linear-gradient(150deg,var(--brand),var(--brandD)); display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:0 14px 28px -10px rgba(240,169,26,.7); transform:rotate(-4deg);\">🍙<\u002Fdiv>\n          <div style=\"margin-top:18px; font-size:13px; font-weight:700; letter-spacing:.04em; color:var(--brandD);\">김밥 · 샌드위치 전문점<\u002Fdiv>\n          <h1 style=\"margin:6px 0 0; font-size:27px; font-weight:800; letter-spacing:-.02em;\">달콤한 진스쿡<\u002Fh1>\n          <p style=\"margin:10px 0 0; font-size:14px; line-height:1.6; color:var(--ink2);\">전화번호만 입력하면<br>방문할 때마다 포인트가 쌓여요<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--card); border:1px solid var(--line); border-radius:22px; padding:22px 20px; box-shadow:0 10px 30px -22px rgba(70,45,12,.6);\">\n          <label style=\"font-size:12.5px; font-weight:800; color:var(--ink2); letter-spacing:.02em;\">전화번호<\u002Flabel>\n          <input value=\"{{ cInput }}\" oninput=\"{{ onCInput }}\" inputmode=\"numeric\" placeholder=\"010-0000-0000\" style=\"width:100%; margin-top:10px; border:1.5px solid var(--line); border-radius:14px; padding:15px 16px; font-size:21px; font-weight:700; letter-spacing:.02em; outline:none; background:var(--pale2); color:var(--ink); text-align:center;\" style-focus=\"{ borderColor: var(--brand); }\">\n          <button onclick=\"{{ cSubmit }}\" style=\"{{ cSubmitStyle }}\">내 포인트 보기<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:24px;\">\n          <div style=\"font-size:11px; font-weight:800; letter-spacing:.14em; color:var(--ink2); text-align:center;\">DEMO 빠른 입력<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:9px; margin-top:12px;\">\n            <sc-for list=\"{{ demoChips }}\" as=\"chip\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ chip.onClick }}\" style=\"display:flex; align-          <div style=\"font-size:15px; font-weight:800; color:var(--brandD);\">{{ t.pointsStr }}P<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; flex-wrap:wrap; margin-top:14px;\">\n        <div style=\"flex:1 1 300px; background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px 24px;\">\n          <h3 style=\"margin:0 0 14px; font-size:16px; font-weight:800;\">가게 정보<\u002Fh3>\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:var(--ink2); font-weight:700;\">가게명<\u002Fspan><span style=\"font-weight:800;\">달콤한 진스쿡<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:var(--ink2); font-weight:700;\">적립률<\u002Fspan><span style=\"font-weight:800;\">결제금액의 5%<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:var(--ink2); font-weight:700;\">무료 메뉴 기준<\u002Fspan><span style=\"font-weight:800;\">5,000P<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:var(--ink2); font-weight:700;\">누적 단골<\u002Fspan><span style=\"font-weight:800;\">{{ totalCustomers }}명<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 200px; display:flex; align-items:stretch;\">\n          <button onclick=\"{{ logout }}\" style=\"width:100%; background:var(--card); border:1.5px solid var(--line); border-radius:20px; padding:22px; font-size:15px; font-weight:800; color:var(--ink2);\" style-hover=\"{ borderColor: #E0A99A; color: #D8553A; }\">로그아웃 →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- ========== TOAST ========== -->\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; left:50%; bottom:34px; z-index:80; transform:translateX(-50%); animation:jp-toast 2.6s cubic-bezier(.2,.8,.2,1) forwards;\">\n      <div style=\"display:flex; align-items:center; gap:12px; background:var(--ink); color:#fff; border-radius:16px; padding:14px 20px; box-shadow:0 20px 40px -16px rgba(36,27,18,.6);\">\n        <div style=\"width:36px; height:36px; border-radius:10px; background:var(--brand); display:flex; align-items:center; justify-content:center; font-size:19px;\">{{ toastIcon }}<\u002Fdiv>\n        <div><div style=\"font-size:14.5px; font-weight:800;\">{{ toastTitle }}<\u002Fdiv><div style=\"font-size:12px; opacity:.75; font-weight:600; margin-top:1px;\">{{ toastSub }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.customers = [\n      { phone:'01023457788', name:'김서연', points:3420, visits:18, last:'6월 26일',\n        history:[\n          {type:'earn', label:'참치김밥 외 1', amt:170, date:'6월 26일'},\n          {type:'use',  label:'아메리카노 교환', amt:-2000, date:'6월 20일'},\n          {type:'earn', label:'에그 샌드위치', amt:240, date:'6월 18일'},\n          {type:'earn', label:'소고기김밥', amt:160, date:'6월 14일'},\n        ] },\n      { phone:'01098765432', name:'이준호', points:5180, visits:24, last:'6월 27일',\n        history:[\n          {type:'earn', label:'베이컨 샌드위치', amt:320, date:'6월 27일'},\n          {type:'earn', label:'치즈김밥 외 2', amt:280, date:'6월 22일'},\n          {type:'use',  label:'음료 교환', amt:-2500, date:'6월 15일'},\n        ] },\n      { phone:'01034561290', name:'박지우', points:1240, visits:7, last:'6월 25일',\n        history:[\n          {type:'earn', label:'김치김밥', amt:150, date:'6월 25일'},\n          {type:'earn', label:'햄치즈 샌드위치', amt:200, date:'6월 19일'},\n        ] },\n      { phone:'01077880011', name:'최민재', points:760, visits:4, last:'6월 24일',\n        history:[\n          {type:'earn', label:'멸치김밥', amt:90, date:'6월 24일'},\n          {type:'earn', label:'참치김밥', amt:130, date:'6월 17일'},\n        ] },\n      { phone:'01022334455', name:'정하윤', points:2890, visits:13, last:'6월 26일',\n        history:[\n          {type:'earn', label:'불고기 샌드위치', amt:260, date:'6월 26일'},\n          {type:'use',  label:'김밥 1줄 교환', amt:-3000, date:'6월 21일'},\n          {type:'earn', label:'야채김밥 외 1', amt:190, date:'6월 16일'},\n        ] },\n    ];\n    this.dash = {\n      kpis:[\n        {label:'오늘 적립', value:'14건', icon:'☕', tint:'var(--pale)', color:'var(--brandD)'},\n        {label:'신규 손님', value:'3명', icon:'🌱', tint:'var(--leafBg)', color:'var(--leaf)'},\n        {label:'적립 포인트', value:'8,200P', icon:'⭐', tint:'var(--pale)', color:'var(--brandD)'},\n      ],\n      week:[{d:'월',v:38},{d:'화',v:42},{d:'수',v:35},{d:'목',v:51},{d:'금',v:67},{d:'토',v:88},{d:'일',v:59,today:true}],\n    };\n    this.state = {\n      mode:'customer', variant:'A',\n      loggedIn:false, pin:'', pinErr:false, ownerTab:'reward',\n      rPhone:'', rAmount:'', toast:null,\n      query:'', expanded:null,\n      rewardLog:[\n        {phone:'010-9876-5432', name:'이준호', earn:320, time:'14:32'},\n        {phone:'010-2345-7788', name:'김서연', earn:170, time:'13:05'},\n        {phone:'010-7788-0011', name:'최민재', earn:90, time:'11:48'},\n      ],\n      ptsOverride:{},\n      cView:'landing', cInput:'', cLookup:'',\n    };\n  }\n  // ---- helpers ----\n  fmtPhone(v){ let d=(v||'').replace(/\\D/g,'').slice(0,11); if(d.length<4)return d; if(d.length<8)return d.slice(0,3)+'-'+d.slice(3); return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7); }\n  digits(v){ return (v||'').replace(/\\D/g,''); }\n  comma(n){ return Number(n||0).toLocaleString('ko-KR'); }\n  custBy(v){ const d=this.digits(v); return this.customers.find(c=>c.phone===d); }\n  ptsOf(c){ return c.points + (this.state.ptsOverride[c.phone]||0); }\n  nowTime(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }\n  // ---- mode / variant ----\n  setMode(m){ this.setState({mode:m}); }\n  setVariant(v){ this.setState({variant:v}); }\n  // ---- customer ----\n  onCInput(e){ this.setState({cInput:this.fmtPhone(e.target.value)}); }\n  cDemo(p){ this.setState({cInput:this.fmtPhone(p)}); }\n  cSubmit(){ if(this.digits(this.state.cInput).length<10)return; this.setState({cLookup:this.digits(this.state.cInput), cView:'point'}); }\n  cBack(){ this.setState({cView:'landing', cInput:''}); }\n  // ---- pin ----\n  pinPress(k){ const s=this.state; if(k==='back')return this.setState({pin:s.pin.slice(0,-1), pinErr:false}); if(k==='clear')return this.setState({pin:'', pinErr:false}); if(s.pin.length>=4)return; this.setState({pin:s.pin+k, pinErr:false}); }\n  pinDemo(){ this.setState({pin:'1234', pinErr:false}); }\n  doLogin(){ if(this.state.pin==='1234') this.setState({loggedIn:true, pin:'', ownerTab:'reward'}); else this.setState({pinErr:true}); }\n  logout(){ this.setState({loggedIn:false, pin:'', ownerTab:'reward'}); }\n  setTab(t){ this.setState({ownerTab:t}); }\n  // ---- reward ----\n  onRPhone(e){ this.setState({rPhone:this.fmtPhone(e.target.value)}); }\n  amtKey(k){ let a=this.digits(this.state.rAmount); if(k==='back')a=a.slice(0,-1); else if(k==='00')a=a+'00'; else a=a+k; a=a.replace(/^0+/,''); if(a.length>7)a=a.slice(0,7); this.setState({rAmount:a}); }\n  amtQuick(n){ let a=parseInt(this.digits(this.state.rAmount)||'0',10)+n; this.setState({rAmount:String(a)}); }\n  amtClear(){ this.setState({rAmount:''}); }\n  submitReward(){\n    const s=this.state; const d=this.digits(s.rPhone); const amt=parseInt(this.digits(s.rAmount)||'0',10);\n    if(d.length<10||amt<=0)return;\n    const earn=Math.floor(amt*0.05); const c=this.custBy(d);\n    const name=c?c.name:'신규 손님'; const isNew=!c;\n    const entry={phone:this.fmtPhone(d), name, earn, time:this.nowTime()};\n    this.setState(st=>{\n      const ov={...st.ptsOverride}; if(c) ov[c.phone]=(ov[c.phone]||0)+earn;\n      return { rewardLog:[entry,...st.rewardLog].slice(0,6), rPhone:'', rAmount:'', ptsOverride:ov, toast:{name, earn, isNew} };\n    });\n    clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}), 2600);\n  }\n  // ---- search ----\n  onQuery(e){ this.setState({query:e.target.value}); }\n  toggleExpand(p){ this.setState(st=>({expanded: st.expanded===p?null:p})); }\n\n  renderVals(){\n    const s=this.state, ink='var(--ink)', ink2='var(--ink2)', brand='var(--brand)', card='var(--card)', line='var(--line)';\n    const seg=(on)=>({padding:'8px 16px', borderRadius:'999px', fontSize:'13px', fontWeight:800, color: on?ink:ink2, background: on?card:'transparent', boxShadow: on?'0 3px 10px -4px rgba(70,45,12,.4)':'none', transition:'all .15s'});\n    const segSm=(on)=>({padding:'6px 13px', borderRadius:'999px', fontSize:'12.5px', fontWeight:800, whiteSpace:'nowrap', color: on?ink:ink2, background: on?card:'transparent', transition:'all .15s'});\n    const variantA = s.variant==='A', variantB = s.variant==='B';\n    const modeCustomer = s.mode==='customer', modeOwner = s.mode==='owner';\n\n    // ---- customer point computed ----\n    const cust = this.custBy(s.cLookup);\n    let cVals={};\n    if(cust){\n      const pts=this.ptsOf(cust); const remain=Math.max(0,5000-(pts%5000===0&&pts>0?5000:pts%5000));\n      const within=pts%5000; const pct=Math.min(100, within/5000*100);\n      const stampN=cust.visits%10; const stamps=Array.from({length:10},(_,i)=>{\n        const f=i<stampN;\n        return { mark: f?'🍙':'', style:{width:'30px',height:'30px',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',fontWeight:800, background: f?'var(--brand)':'var(--pale2)', border:'1px solid '+(f?'var(--brandD)':line), color:f?ink:'#D9C9AE'} };\n      });\n      const hist=cust.history.map(h=>({ label:h.label, date:h.date,\n        icon: h.type==='earn'?'🍙':'🎁',\n        iconStyle:{flex:'none',width:'38px',height:'38px',borderRadius:'11px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'17px', background: h.type==='earn'?'var(--pale2)':'var(--leafBg)'},\n        amtStr:(h.amt>0?'+':'')+this.comma(h.amt)+'P',\n        amtStyle:{fontSize:'15px',fontWeight:800, color: h.amt>0?ink:'var(--leaf)'} }));\n      cVals={ cName:cust.name, cVisits:cust.visits, cPointsStr:this.comma(pts), cRemainStr:this.comma(5000-within===5000?0:5000-within), cPctStr:pct+'%', couponStamps:stamps, cHistory:hist };\n    }\n\n    // ---- reward computed ----\n    const rD=this.digits(s.rPhone); const rAmt=parseInt(this.digits(s.rAmount)||'0',10);\n    const rMatch=this.custBy(rD); const rShow=rD.length>=10; const rEarn=Math.floor(rAmt*0.05);\n    const quickChips=[{label:'+1,000', onClick:()=>this.amtQuick(1000)},{label:'+5,000', onClick:()=>this.amtQuick(5000)},{label:'전체삭제', onClick:()=>this.amtClear()}];\n    const keyBtn={height:'52px',borderRadius:'13px',background:card,border:'1px solid '+line,fontSize:'21px',fontWeight:800,color:ink,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .1s'};\n    const amtKeys=['1','2','3','4','5','6','7','8','9','00','0','back'].map(k=>({label:k==='back'?'⌫':k, onClick:()=>this.amtKey(k), style:{...keyBtn, fontSize:k==='back'?'19px':'21px'}}));\n    const pinKeys=['1','2','3','4','5','6','7','8','9','clear','0','back'].map(k=>({label:k==='clear'?'C':k==='back'?'⌫':k, onClick:()=>this.pinPress(k), style:{...keyBtn, color:(k==='clear'||k==='back')?ink2:ink, fontSize:(k==='clear')?'18px':k==='back'?'19px':'21px'}}));\n    const pinDots=Array.from({length:4},(_,i)=>({style:{width:'15px',height:'15px',borderRadius:'50%', background: i<s.pin.length?'var(--brandD)':'transparent', border:'2px solid '+(i<s.pin.length?'var(--brandD)':line), transition:'all .15s'}}));\n    const rLog=s.rewardLog.map(r=>({name:r.name, phone:r.phone, earn:this.comma(r.earn), time:r.time}));\n    const canSub = rD.length>=10 && rAmt>0;\n    const rSubmitStyle={width:'100%', padding:'17px', borderRadius:'16px', fontSize:'16px', fontWeight:800, transition:'all .15s', background: canSub?'var(--ink)':'#E7DcC8', color: canSub?'#fff':'#B4A48E', cursor: canSub?'pointer':'not-allowed', boxShadow: canSub?'0 12px 24px -12px rgba(36,27,18,.5)':'none'};\n\n    // ---- search computed ----\n    const q=this.digits(s.query);\n    const filtered=this.customers.filter(c=> q==='' || c.phone.includes(q));\n    const sorted=[...filtered].sort((a,b)=>this.ptsOf(b)-this.ptsOf(a));\n    const searchList=sorted.map(c=>{\n      const exp=s.expanded===c.phone; const pts=this.ptsOf(c); const within=pts%5000;\n      return { name:c.name, phone:this.fmtPhone(c.phone), initial:c.name.charAt(0), pointsStr:this.comma(pts), visits:c.visits, expanded:exp,\n        remainStr:this.comma(5000-within===5000?0:5000-within), lastVisit:c.last,\n        onClick:()=>this.toggleExpand(c.phone),\n        cardStyle:{background:card, border:'1px solid '+(exp?'var(--brand)':line), borderRadius:'16px', padding:'16px 18px', cursor:'pointer', transition:'all .2s', boxShadow: exp?'0 14px 30px -18px rgba(240,169,26,.6)':'0 8px 24px -22px rgba(70,45,12,.5)'},\n        history:c.history.slice(0,3).map(h=>({label:h.label, date:h.date, amtStr:(h.amt>0?'+':'')+this.comma(h.amt)+'P', amtStyle:{fontSize:'13px',fontWeight:800, color:h.amt>0?ink:'var(--leaf)'}})) };\n    });\n\n    // ---- dashboard computed ----\n    const maxV=Math.max(...this.dash.week.map(w=>w.v));\n    const weekBars=this.dash.week.map(w=>({ day:w.d, value:w.v, heightStr:(w.v/maxV*100)+'%',\n      barBg: w.today?'linear-gradient(var(--brand),var(--brandD))':'var(--pale)',\n      labelColor: w.today?'var(--brandD)':ink2, dayColor: w.today?ink:ink2 }));\n    const kpis=this.dash.kpis.map(k=>({label:k.label, value:k.value, icon:k.icon, iconStyle:{width:'34px',height:'34px',borderRadius:'10px',background:k.tint,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'17px'}}));\n    const top=[...this.customers].sort((a,b)=>this.ptsOf(b)-this.ptsOf(a)).slice(0,3).map((c,i)=>({\n      rank:i+1, name:c.name, visits:c.visits, pointsStr:this.comma(this.ptsOf(c)),\n      rankStyle:{flex:'none',width:'30px',height:'30px',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'14px', background:i===0?'var(--brand)':'var(--pale2)', color:i===0?ink:ink2} }));\n\n    // ---- demo chips ----\n    const tagPill=(t)=>({fontSize:'11px',fontWeight:800,padding:'4px 10px',borderRadius:'999px', background:t==='단골'?'var(--pale)':'var(--leafBg)', color:t==='단골'?'var(--brandD)':'var(--leaf)'});\n    const demoChips=[\n      {phone:'010-2345-7788', tag:'단골', tagStyle:tagPill('단골'), onClick:()=>this.cDemo('01023457788')},\n      {phone:'010-9876-5432', tag:'단골', tagStyle:tagPill('단골'), onClick:()=>this.cDemo('01098765432')},\n      {phone:'010-0000-0000', tag:'신규', tagStyle:tagPill('신규'), onClick:()=>this.cDemo('01000000000')},\n    ];\n\n    const tab=(name)=>({padding:'9px 16px', borderRadius:'10px', fontSize:'13.5px', fontWeight:800, transition:'all .15s', background: s.ownerTab===name?card:'transparent', color: s.ownerTab===name?ink:ink2, boxShadow: s.ownerTab===name?'0 4px 12px -5px rgba(70,45,12,.4)':'none'});\n    const toast=s.toast;\n\n    return {\n      modeCustomer, modeOwner, variantA, variantB,\n      showVariant: (modeCustomer && s.cView==='point' && cust) || (modeOwner && s.loggedIn && s.ownerTab==='reward'),\n      pickCustomer:()=>this.setMode('customer'), pickOwner:()=>this.setMode('owner'),\n      pickVarA:()=>this.setVariant('A'), pickVarB:()=>this.setVariant('B'),\n      custBtnStyle:segSm(modeCustomer), ownerBtnStyle:segSm(modeOwner),\n      varABtnStyle:segSm(variantA), varBBtnStyle:segSm(variantB),\n\n      // customer\n      cLanding: s.cView==='landing', cPoint: s.cView==='point',\n      cInput:s.cInput, onCInput:(e)=>this.onCInput(e), cSubmit:()=>this.cSubmit(), cBack:()=>this.cBack(),\n      cSubmitStyle:{width:'100%', marginTop:'14px', padding:'15px', borderRadius:'14px', background:'var(--ink)', color:'#fff', fontSize:'15.5px', fontWeight:800, boxShadow:'0 12px 24px -12px rgba(36,27,18,.5)', transition:'transform .1s'},\n      demoChips,\n      cPhoneFmt:this.fmtPhone(s.cLookup), cIsNew: !cust && s.cView==='point', cHasData: !!cust,\n      ...cVals,\n\n      // owner\n      oLogin: !s.loggedIn, oApp: s.loggedIn,\n      pinDots, pinKeys, pinErr:s.pinErr, pinShake: s.pinErr?'animation:jp-shake .4s;':'',\n      doLogin:()=>this.doLogin(), pinDemo:()=>this.pinDemo(),\n      loginBtnStyle:{width:'100%', marginTop:'16px', padding:'15px', borderRadius:'14px', background: s.pin.length===4?'var(--ink)':'#E7DcC8', color: s.pin.length===4?'#fff':'#B4A48E', fontSize:'15.5px', fontWeight:800, transition:'all .15s', cursor: s.pin.length===4?'pointer':'default'},\n      tabReward:()=>this.setTab('reward'), tabSearch:()=>this.setTab('search'), tabDash:()=>this.setTab('dash'),\n      tabRewardStyle:tab('reward'), tabSearchStyle:tab('search'), tabDashStyle:tab('dash'),\n      isReward: s.ownerTab==='reward', isSearch: s.ownerTab==='search', isDash: s.ownerTab==='dash',\n      logout:()=>this.logout(),\n\n      // reward\n      rPhone:s.rPhone, onRPhone:(e)=>this.onRPhone(e),\n      rAmountStr: rAmt>0?this.comma(rAmt):'0', rAmtColor: rAmt>0?ink:'#CDBC9F',\n      quickChips, amtKeys, submitReward:()=>this.submitReward(), rSubmitStyle,\n      rShowStatus:rShow, rNoStatus:!rShow,\n      rMatchName: rMatch?rMatch.name:'신규 손님',\n      rMatchSub: rMatch?('보유 '+this.comma(this.ptsOf(rMatch))+'P · '+rMatch.visits+'회 방문'):'첫 방문 손님이에요',\n      rBadgeText: rMatch?'단골':'🌱 신규',\n      rBadgeStyle:{background: rMatch?'rgba(36,27,18,.14)':'var(--leaf)', color: rMatch?ink:'#fff', borderRadius:'999px', padding:'4px 11px', fontSize:'11.5px', fontWeight:800},\n      rEarnStr:this.comma(rEarn), rewardLogView:rLog,\n\n      // search\n      query:s.query, onQuery:(e)=>this.onQuery(e), searchList, searchCount:searchList.length,\n      searchEmpty: searchList.length===0,\n\n      // dashboard\n      kpis, weekBars, topCustomers:top, totalCustomers:this.customers.length,\n\n      // toast\n      hasToast: !!toast,\n      toastIcon: toast? (toast.isNew?'🌱':'🍙') : '',\n      toastTitle: toast? (toast.name+' · +'+this.comma(toast.earn)+'P 적립 완료') : '',\n      toastSub: toast? (toast.isNew?'신규 손님으로 등록되었어요':'포인트가 적립되었어요') : '',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
